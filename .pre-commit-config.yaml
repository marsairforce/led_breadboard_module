# 20260220
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-docstring-first
        exclude: tests
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: pretty-format-json
        args: ["--autofix"]
        stages: [pre-commit]
      - id: check-symlinks
      - id: detect-aws-credentials
        stages: [pre-commit]
        args: [--allow-missing-credentials]
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-case-conflict
      - id: mixed-line-ending
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: ["--maxkb=1500"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        stages: [pre-commit]
        exclude: "alembic|tests"
        additional_dependencies:
          [
            "types-croniter",
            "types-requests",
            "types-PyYAML",
            "textual",
            "types-python-dateutil",
            "types-pytz",
            "types-toml",
            "types-tabulate",
          ]

  - repo: "https://github.com/astral-sh/ruff-pre-commit"
    rev: v0.11.13
    hooks:
      - id: ruff
        stages: [pre-commit]
        args:
          - "--config"
          - "ruff-local.toml"
          - "--fix-only"
      - id: ruff-format
        stages: [pre-commit]
        args:
          - "--config"
          - "ruff-local.toml"


  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        # Adjust file types as needed. This covers common Node.js files.
        files: '\.(js|jsx|ts|tsx|json|css|scss|md|yaml|yml|html)$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        stages: [pre-commit]

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        stages: [pre-commit]
      - id: cargo-check
        stages: [pre-commit]

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.0.190
    hooks:
      - id: rumdl-fmt  # Auto-format (fixes what it can)
      - id: rumdl      # Lint only (fails on issues)
